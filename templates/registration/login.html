{% extends 'base.html' %}
{% block title %}Login | {{ site_profile.name }}{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <p>Enter your credentials to manage your website</p>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-input" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="form-input" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    </form>
    <p style="margin-top:20px"><a href="{% url 'home' %}" style="color:var(--accent)">← Back to Website</a></p>
  </div>
</div>
{% endblock %}
