{% extends 'blog/dashboard_base.html' %}
{% block title %}Delete {{ type }}{% endblock %}
{% block dashboard_content %}
<div class="delete-page" style="min-height:60vh;display:flex;align-items:center;justify-content:center">
  <div class="delete-card">
    <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
    <h2>Delete {{ type }}</h2>
    <p>Are you sure you want to delete <strong style="color:var(--white)">{{ object }}</strong>?<br>
    This action <strong style="color:var(--danger)">cannot be undone</strong>.</p>
    <div class="btn-group">
      <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
      </form>
      <a href="javascript:history.back()" class="btn btn-outline">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
